<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Info Component</title>
<style>
/* =========================================
    3. LEFT SIDEBAR - THE PRO FIX
   ========================================= */

.sidebar-left {
    grid-area: left-side;
    background-color: #121212;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 12px 8px;
}

/* Header Setup */
.library-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    height: 48px;
}

.library-toggle-wrapper {
    position: relative;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* HOVER LOGIC: Hide book, show bracket when collapsed */
#left-state-btn {
    position: absolute;
    opacity: 0;
    transition: opacity 0.2s;
}

body:not(.left-sidebar-expanded) .library-toggle-wrapper:hover #library-book-main {
    opacity: 0;
}

body:not(.left-sidebar-expanded) .library-toggle-wrapper:hover #left-state-btn {
    opacity: 1;
}

/* EXPANDED STATE UI (Image 2) */
body.left-sidebar-expanded .library-title,
body.left-sidebar-expanded .row-meta,
body.left-sidebar-expanded .collapse-icon-expanded {
    display: flex;
    opacity: 1;
}

/* COLLAPSED STATE UI (Image 3) */
body:not(.left-sidebar-expanded) .library-title,
body:not(.left-sidebar-expanded) .row-meta,
body:not(.left-sidebar-expanded) .collapse-icon-expanded {
    display: none;
}

/* THE ARROW FLIP (Points Left when Open) */
body.left-sidebar-expanded #left-collapse-btn {
    transform: rotate(180deg);
    cursor: pointer;
}

/* Row Items alignment */
.library-row-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.library-row-item:hover { background-color: #2a2a2a; }

.row-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    border-radius: 4px;
    overflow: hidden;
}

.row-icon img { width: 100%; height: 100%; object-fit: cover; }

.row-meta {
    flex-direction: column;
}

.row-title { font-size: 14px; font-weight: 600; color: #fff; }
.row-subtitle { font-size: 12px; color: #b3b3b3; }
</style>
</head>
    <body>
        
<aside class="sidebar-left">
    <div class="sidebar-library-panel">
        <div class="library-header">
            <div class="header-left">
                <div class="library-toggle-wrapper">
                    <i class="fa-solid fa-book-open" id="library-book-main"></i>
                    <i class="fa-solid fa-right-to-bracket state-trigger" id="left-state-btn"></i>
                </div>
                <span class="library-title">Your Library</span>
            </div>
            
            <div class="header-right">
                <i class="fa-solid fa-plus"></i>
                <i class="fa-solid fa-right-to-bracket collapse-icon-expanded" id="left-collapse-btn"></i>
            </div>
        </div>

        <div class="library-content">
            <div class="library-row-item">
                <div class="row-icon liked-gradient"><i class="fa-solid fa-heart"></i></div>
                <div class="row-meta">
                    <span class="row-title">Liked Songs</span>
                    <span class="row-subtitle">Playlist • 448 songs</span>
                </div>
            </div>
            <div class="library-row-item">
                <div class="row-icon"><img src="Utils/this-is-the-weeknd.jpg"></div>
                <div class="row-meta">
                    <span class="row-title">This Is The Weeknd</span>
                    <span class="row-subtitle">Playlist • Spotify</span>
                </div>
            </div>
        </div>
    </div>
</aside>

        <script>
            
            // Toggle logic for BOTH buttons
            const stateTrigger = document.getElementById('left-state-btn'); // The hover one
            const collapseTrigger = document.getElementById('left-collapse-btn'); // The expanded one

            [stateTrigger, collapseTrigger].forEach(btn => {
                if (btn) {
                    btn.addEventListener('click', () => {
                        document.body.classList.toggle('left-sidebar-expanded');
                    });
                }
            });

        </script>
    </body>
</html>
