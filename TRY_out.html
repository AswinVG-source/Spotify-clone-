<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Info Component</title>
<style>
:root {
    --sidebar-left-width: 280px;
    --sidebar-left-collapsed: 72px; /* Spotify's icon-only width */
}

/* Update the Grid to handle Left Collapse */
.grid-container {
    display: grid;
    /* We use the variables here so they can be changed via JS/Classes */
    grid-template-columns: var(--sidebar-left-width) 1fr var(--right-sidebar-width);
    grid-template-rows: 64px 1fr 90px;
    transition: grid-template-columns 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* State: Left Sidebar Collapsed */
body.left-sidebar-collapsed .grid-container {
    grid-template-columns: var(--sidebar-left-collapsed) 1fr var(--right-sidebar-width);
}

/* State: BOTH Sidebars Collapsed (Main Area is Massive) */
body.left-sidebar-collapsed.right-sidebar-collapsed .grid-container {
    grid-template-columns: var(--sidebar-left-collapsed) 1fr 12px;
}

/* --- Left Sidebar Styling --- */
.sidebar-left {
    grid-area: left-side;
    overflow-x: hidden;
    padding: 12px;
    display: flex;
    flex-direction: column;
}

/* Hide text labels when collapsed */
.nav-text {
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.2s ease;
}

body.left-sidebar-collapsed .nav-text {
    opacity: 0;
    pointer-events: none;
}

/* Style the library items to look like Spotify icons */
.library-item, .library-toggle-group, .add-playlist {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
}

.library-item:hover { background: #282828; }

.item-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0; /* Prevents icon from squishing */
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #282828;
    overflow: hidden;
}

.item-icon img { width: 100%; height: 100%; object-fit: cover; }
.liked-bg { background: linear-gradient(135deg, #450af5, #c4efd9); }
</style>
</head>
    <body>
        
<aside class="sidebar-left">
    <div class="sidebar-left-content">
        <div class="sidebar-top-controls">
            <div class="library-toggle-group">
                <i class="fa-solid fa-book-open" id="library-toggle-btn"></i>
                <span class="nav-text">Your Library</span>
            </div>
            <div class="add-playlist">
                <i class="fa-solid fa-plus"></i>
                <span class="nav-text">Create Playlist</span>
            </div>
        </div>

        <div class="library-list">
            <div class="library-item">
                <div class="item-icon liked-bg"><i class="fa-solid fa-heart"></i></div>
                <span class="nav-text">Liked Songs</span>
            </div>
            <div class="library-item">
                <div class="item-icon"><img src="Utils/playlist1.jpg"></div>
                <span class="nav-text">Hip Hop Mix</span>
            </div>
            </div>
    </div>
</aside>

        <script>

            const leftToggleBtn = document.getElementById('library-toggle-btn');

            leftToggleBtn.addEventListener('click', () => {
                // Toggle the class on the body
                body.classList.toggle('left-sidebar-collapsed');
            });

        </script>
    </body>
</html>
